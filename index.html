```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f4f9;
            margin: 0;
        }

        .calc-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            margin: 10px 0;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: #333;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="calc-card">
        <h2>Flask Calculator</h2>

        <form method="POST">
            <input 
                type="number" 
                step="any" 
                name="num1" 
                placeholder="First Number" 
                required
            >

            <select name="operation">
                <option value="add">+</option>
                <option value="subtract">−</option>
                <option value="multiply">×</option>
                <option value="divide">÷</option>
            </select>

            <input 
                type="number" 
                step="any" 
                name="num2" 
                placeholder="Second Number" 
                required
            >

            <button type="submit">
                Calculate
            </button>
        </form>

        {% if result %}
        <div class="result">
            Result: {{ result }}
        </div>
        {% endif %}

    </div>
</body>
</html>
```
